<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Skill Cooldowns</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>League of Legends <span>Skill CDs</span></h1>
            <input type="text" id="searchInput" placeholder="チャンピオンを検索..." autocomplete="off">
        </div>
    </header>

    <main class="container">
        <div id="loading" class="loading">チャンピオンデータを読み込み中...</div>
        <div id="championGrid" class="champion-grid"></div>
    </main>

    <!-- Modal -->
    <div id="championModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" id="closeModal">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
